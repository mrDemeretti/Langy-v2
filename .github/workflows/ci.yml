name: Langy CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Syntax check (all JS files)
        run: |
          find src -name "*.js" -exec node -c {} \;
          echo "All files pass syntax check"
      
      - name: Run ESLint
        run: npm run lint
      
      - name: Run unit tests
        run: npm test
