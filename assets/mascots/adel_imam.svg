<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg2" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#FDBA74"/>
      <stop offset="100%" stop-color="#F97316"/>
    </radialGradient>
    <radialGradient id="skin2" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#E8C8A0"/>
      <stop offset="100%" stop-color="#D4A878"/>
    </radialGradient>
  </defs>
  <circle cx="200" cy="200" r="200" fill="url(#bg2)"/>
  <!-- Hair -->
  <ellipse cx="200" cy="140" rx="90" ry="80" fill="#4A4A4A"/>
  <!-- Face -->
  <ellipse cx="200" cy="185" rx="75" ry="85" fill="url(#skin2)"/>
  <!-- Hair front (grey-streaked) -->
  <path d="M125 150 Q140 100 200 90 Q260 100 275 150 Q265 120 200 110 Q135 120 125 150Z" fill="#5A5A5A"/>
  <!-- Eyebrows (thick, expressive) -->
  <path d="M155 168 Q175 158 195 165" stroke="#3A3A3A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <path d="M205 165 Q225 158 245 168" stroke="#3A3A3A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Eyes (warm, wise) -->
  <ellipse cx="175" cy="185" rx="11" ry="10" fill="#3A2510"/>
  <ellipse cx="225" cy="185" rx="11" ry="10" fill="#3A2510"/>
  <circle cx="177" cy="183" r="3.5" fill="white" opacity="0.6"/>
  <circle cx="227" cy="183" r="3.5" fill="white" opacity="0.6"/>
  <!-- Crow's feet (laugh lines) -->
  <path d="M150 185 L143 180" stroke="#C4986888" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M150 188 L142 188" stroke="#C4986888" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M250 185 L257 180" stroke="#C4986888" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M250 188 L258 188" stroke="#C4986888" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M192 195 Q200 210 208 195" stroke="#B8885A" stroke-width="2.5" fill="none"/>
  <!-- Mustache -->
  <path d="M170 218 Q185 210 200 215 Q215 210 230 218" stroke="#4A4A4A" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Big warm smile -->
  <path d="M170 228 Q200 252 230 228" stroke="#A06050" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M175 230 Q200 248 225 230" fill="#FFFFFF55"/>
  <!-- Neck -->
  <rect x="183" y="265" width="34" height="25" rx="12" fill="#D4A878"/>
  <!-- Suit jacket -->
  <ellipse cx="200" cy="340" rx="105" ry="65" fill="#1E293B"/>
  <!-- Collar/shirt -->
  <path d="M170 300 L200 280 L230 300" stroke="white" stroke-width="2.5" fill="#F8FAFC"/>
  <!-- Tie -->
  <polygon points="197,285 203,285 205,320 195,320" fill="#DC2626"/>
  <!-- Name -->
  <text x="200" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="white" opacity="0.9">ADEL IMAM</text>
</svg>